name: Process Sermon

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL — video or channel'
        required: true
        type: string
      speaker:
        description: 'Speaker name (optional, auto-detected from video)'
        required: false
        type: string
        default: ''
      date:
        description: 'Sermon date YYYY-MM-DD (optional, auto-detected)'
        required: false
        type: string
        default: ''
      series:
        description: 'Sermon series name'
        required: false
        type: string
        default: ''
      category:
        description: 'Content category'
        required: false
        type: choice
        default: 'sermon'
        options:
          - sermon
          - prayer
          - grace
          - faith
          - family
          - marriage
          - personal-development

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      INPUT_URL: ${{ inputs.url }}
      INPUT_SPEAKER: ${{ inputs.speaker }}
      INPUT_DATE: ${{ inputs.date }}
      INPUT_SERIES: ${{ inputs.series }}
      INPUT_CATEGORY: ${{ inputs.category }}

    steps:
      - name: Validate URL
        run: |
          if [ -z "$INPUT_URL" ]; then
            echo "::error::URL is required"
            exit 1
          fi

      - name: Install yt-dlp and deno
        run: |
          pip install yt-dlp
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"

      - name: Download audio from YouTube
        id: download
        env:
          YOUTUBE_COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          mkdir -p /tmp/sermon-audio

          # Write cookies file if available
          COOKIE_ARGS=""
          if [ -n "$YOUTUBE_COOKIES_B64" ]; then
            echo "$YOUTUBE_COOKIES_B64" | base64 -d > /tmp/yt_cookies.txt
            COOKIE_ARGS="--cookies /tmp/yt_cookies.txt"
            echo "Using YouTube cookies for authentication"
          fi

          # Download audio and extract metadata as JSON
          yt-dlp \
            --format "bestaudio/best" \
            --extract-audio \
            --audio-format mp3 \
            --audio-quality 128K \
            --output "/tmp/sermon-audio/%(id)s.%(ext)s" \
            --print-json \
            --no-simulate \
            $COOKIE_ARGS \
            "$INPUT_URL" > /tmp/sermon-audio/metadata.json

          # Parse metadata
          VIDEO_ID=$(python3 -c "import json; d=json.load(open('/tmp/sermon-audio/metadata.json')); print(d.get('id',''))")
          VIDEO_TITLE=$(python3 -c "import json; d=json.load(open('/tmp/sermon-audio/metadata.json')); print(d.get('title',''))")
          UPLOADER=$(python3 -c "import json; d=json.load(open('/tmp/sermon-audio/metadata.json')); print(d.get('uploader',''))")
          UPLOAD_DATE=$(python3 -c "import json; d=json.load(open('/tmp/sermon-audio/metadata.json')); print(d.get('upload_date',''))")

          # Find the mp3 file
          AUDIO_FILE=$(find /tmp/sermon-audio -name "*.mp3" | head -1)
          if [ -z "$AUDIO_FILE" ]; then
            echo "::error::No audio file found after download"
            exit 1
          fi

          BLOB_NAME="${VIDEO_ID}.mp3"
          echo "video_id=$VIDEO_ID" >> "$GITHUB_OUTPUT"
          echo "video_title=$VIDEO_TITLE" >> "$GITHUB_OUTPUT"
          echo "uploader=$UPLOADER" >> "$GITHUB_OUTPUT"
          echo "upload_date=$UPLOAD_DATE" >> "$GITHUB_OUTPUT"
          echo "audio_file=$AUDIO_FILE" >> "$GITHUB_OUTPUT"
          echo "blob_name=$BLOB_NAME" >> "$GITHUB_OUTPUT"

          SIZE_MB=$(du -m "$AUDIO_FILE" | cut -f1)
          echo "Downloaded: $VIDEO_TITLE ($SIZE_MB MB)"

      - name: Upload audio to Azure Blob Storage
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          pip install azure-storage-blob
          python3 - <<'PYEOF'
          import os
          from azure.storage.blob import BlobServiceClient

          conn_str = os.environ["AZURE_STORAGE_CONNECTION_STRING"]
          blob_name = "${{ steps.download.outputs.blob_name }}"
          audio_file = "${{ steps.download.outputs.audio_file }}"

          blob_service = BlobServiceClient.from_connection_string(conn_str)
          blob_client = blob_service.get_blob_client("sermon-audio", blob_name)

          with open(audio_file, "rb") as f:
              blob_client.upload_blob(f, overwrite=True)

          size_mb = os.path.getsize(audio_file) / (1024 * 1024)
          print(f"Uploaded {blob_name} ({size_mb:.1f} MB) to sermon-audio container")
          PYEOF

      - name: Call Azure Function to process
        env:
          AZURE_FUNCTION_URL: ${{ secrets.AZURE_FUNCTION_URL }}
          AZURE_FUNCTION_KEY: ${{ secrets.AZURE_FUNCTION_KEY }}
        run: |
          # Build JSON payload with audio_blob reference
          PAYLOAD=$(python3 -c "
          import json, os
          print(json.dumps({
              'url': os.environ['INPUT_URL'],
              'speaker': os.environ.get('INPUT_SPEAKER', '') or '${{ steps.download.outputs.uploader }}',
              'series': os.environ.get('INPUT_SERIES', ''),
              'date': os.environ.get('INPUT_DATE', ''),
              'category': os.environ.get('INPUT_CATEGORY', 'sermon'),
              'audio_blob': '${{ steps.download.outputs.blob_name }}',
              'title': '${{ steps.download.outputs.video_title }}',
              'upload_date': '${{ steps.download.outputs.upload_date }}',
          }))
          ")

          echo "Calling Azure Function with audio_blob..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 540 \
            -X POST "${AZURE_FUNCTION_URL}/api/process?code=${AZURE_FUNCTION_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Azure Function returned $HTTP_CODE"
            exit 1
          fi

          # Save result for summary
          echo "$BODY" > /tmp/result.json

      - name: Cleanup
        if: always()
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          # Delete blob from Azure Storage
          BLOB_NAME="${{ steps.download.outputs.blob_name }}"
          if [ -n "$BLOB_NAME" ]; then
            python3 -c "
          import os
          from azure.storage.blob import BlobServiceClient
          try:
              client = BlobServiceClient.from_connection_string(os.environ['AZURE_STORAGE_CONNECTION_STRING'])
              client.get_blob_client('sermon-audio', '$BLOB_NAME').delete_blob()
              print(f'Cleaned up blob: $BLOB_NAME')
          except Exception as e:
              print(f'Blob cleanup skipped: {e}')
          " 2>/dev/null || true
          fi

          # Delete local audio files
          rm -rf /tmp/sermon-audio /tmp/yt_cookies.txt

      - name: Summary
        if: always()
        run: |
          echo "## Sermon Processing" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Video**: ${{ steps.download.outputs.video_title }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Speaker**: ${INPUT_SPEAKER:-${{ steps.download.outputs.uploader }}}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/result.json ]; then
            STATUS=$(python3 -c "import json; print(json.load(open('/tmp/result.json')).get('status','unknown'))" 2>/dev/null || echo "unknown")
            echo "**Result**: $STATUS" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Cloudflare Pages deployment will trigger automatically." >> "$GITHUB_STEP_SUMMARY"
          fi
